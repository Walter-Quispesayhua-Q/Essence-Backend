# nombre de la aplicacion
spring:
  application:
    name: EssenceBackend

  profiles:
    active: dev

  # configuracion Hibernate
  jpa:
    show-sql: false
    open-in-view: false
    properties:
      hibernate:
        format_sql: true
        # arranque rapido: dialecto explicito y sin consultar metadata a la DB
        dialect: org.hibernate.dialect.PostgreSQLDialect
        boot:
          allow_jdbc_metadata_access: false
        temp:
          use_jdbc_metadata_defaults: false
    hibernate:
      ddl-auto: validate

  # ejecutar automaticamente las migraciones de flyway
  flyway:
    enabled: true
    # buenas practicas: definir explicitamente la ubicacion
    locations: classpath:db/migration

# ip wifi para pruebas
server:
  address: 0.0.0.0
  port: 8099

# spring security (jwt localmente)
application:
  security:
    jwt:
      secret-key: ${JWT_SECRET_B64}
      expiration-seconds: 2592000

# nivel de logs
logging:
  level:
    org.flywaydb: INFO

# seguridad rate limit
app:
  security:
    ratelimit:
      trust-forwarded-headers: false

# kiosks de trending para extractor
extractor:
  youtube:
    kiosk:
      songs: trending_music
      albums: New releases
      artists: Trending

# actuator: probes para container apps
management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      probes:
        enabled: true
      show-details: never

