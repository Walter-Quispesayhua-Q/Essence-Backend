# nombre de la aplicacion
spring:
  application:
    name: EssenceBackend

  # configuracion Hibernate
  jpa:
    show-sql: false
    properties:
      hibernate:
        format_sql: true
    hibernate:
      ddl-auto: validate

  # ejecutar automaticamente las migraciones de flyway
  flyway:
    enabled: true
    # buenas practicas: definir explicitamente la ubicacion
    locations: classpath:db/migration

# ip wifi para pruebas
server:
  address: 0.0.0.0
  port: 8099

# spring security (jwt localmente)
application:
  security:
    jwt:
      secret-key: ${JWT_SECRET_B64}
      expiration-seconds: 2592000

# nivel de logs
logging:
  level:
    org.flywaydb: INFO

# seguridad rate limit
app:
  security:
    ratelimit:
      trust-forwarded-headers: false

# kiosks de trending para extractor
extractor:
  youtube:
    kiosk:
      songs: trending_music
      albums: New releases
      artists: Trending

# fallback Piped API cuando NewPipeExtractor falla (produccion)
piped:
  enabled: true
  timeout-seconds: 10
  instances:
    - https://api.piped.private.coffee
    - https://pipedapi.kavin.rocks
    - https://pipedapi.leptons.xyz
    - https://pipedapi-libre.kavin.rocks
    - https://pipedapi.adminforge.de
    - https://piped-api.codespace.cz
    - https://pipedapi.reallyaweso.me

# fallback Invidious API (segundo fallback)
invidious:
  enabled: true
  timeout-seconds: 10
  instances:
    - https://inv.thepixora.com
    - https://inv.nadeko.net
    - https://invidious.nerdvpn.de