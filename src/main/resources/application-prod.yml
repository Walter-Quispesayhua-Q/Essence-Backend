spring:
  # datasource de runtime: usuario con privilegio minimo (essence_app)
  datasource:
    url: ${DB_URL}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}

  # flyway corre las migraciones con usuario admin (puede CREATE/ALTER tables)
  # separacion de privilegios: la app no puede modificar el esquema en runtime
  flyway:
    user: ${DB_ADMIN_USERNAME}
    password: ${DB_ADMIN_PASSWORD}

  # configuracion Hibernate para produccion
  jpa:
    show-sql: false

# en prod confiar cabeceras si hay proxy/gateway confiable
app:
  security:
    ratelimit:
      trust-forwarded-headers: true
