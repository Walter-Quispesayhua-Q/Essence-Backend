spring:
  # configuracion base de datos para desarrollo (postgres local del compose)
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/essence_dev}
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD:postgres}

  # configuracion Hibernate para desarrollo
  jpa:
    show-sql: true

# en dev no confiar cabeceras reenviadas salvo proxy controlado
app:
  security:
    ratelimit:
      trust-forwarded-headers: false
