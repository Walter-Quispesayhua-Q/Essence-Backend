name: Cleanup old workflow runs

on:
  # Mensual: dia 1 de cada mes a las 03:00 UTC (mantenimiento automatico)
  schedule:
    - cron: '0 3 1 * *'
  # Manual: para limpiar bajo demanda (ej: borrar los 149+ runs viejos del keep-warm)
  workflow_dispatch:
    inputs:
      retain_days:
        description: 'Dias a conservar (runs mas viejos se borran)'
        required: true
        default: '0'
      keep_minimum_runs:
        description: 'Minimo de runs por workflow a conservar siempre'
        required: true
        default: '5'
      delete_workflow_pattern:
        description: 'Filtrar por nombre/archivo (vacio = todos). Ej: keep-warm.yml o "Keep warm"'
        required: false
        default: ''
      dry_run:
        description: 'Solo simular sin borrar (true/false)'
        required: true
        default: 'false'
        type: choice
        options:
          - 'false'
          - 'true'

jobs:
  delete-runs:
    runs-on: ubuntu-latest
    permissions:
      actions: write
      contents: read
    steps:
      - name: Delete old workflow runs
        uses: Mattraks/delete-workflow-runs@v2
        with:
          token: ${{ github.token }}
          repository: ${{ github.repository }}
          retain_days: ${{ github.event.inputs.retain_days || '30' }}
          keep_minimum_runs: ${{ github.event.inputs.keep_minimum_runs || '5' }}
          delete_workflow_pattern: ${{ github.event.inputs.delete_workflow_pattern || '' }}
          dry_run: ${{ github.event.inputs.dry_run || 'false' }}
